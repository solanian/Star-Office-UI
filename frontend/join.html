<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star 픽셀 오피스 참여</title>
    <style>
        @font-face {
            font-family: 'ArkPixel';
            src: url('/static/fonts/ark-pixel-12px-proportional-ko.ttf.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'ArkPixel', 'Courier New', monospace;
            padding: 40px 20px;
            gap: 30px;
            color: #fff;
        }
        h1 {
            color: #ffd700;
            font-size: 24px;
            text-align: center;
        }
        .container {
            background: #2c2f3a;
            border: 3px solid #e94560;
            border-radius: 12px;
            padding: 24px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.6);
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #ddd;
        }
        input, select {
            width: 100%;
            padding: 10px 12px;
            font-family: 'ArkPixel', monospace;
            font-size: 14px;
            border: 2px solid #555;
            border-radius: 6px;
            background: #3a3f4f;
            color: #fff;
        }
        button {
            width: 100%;
            padding: 12px;
            font-family: 'ArkPixel', monospace;
            font-size: 16px;
            border: 2px solid #e94560;
            border-radius: 6px;
            background: #e94560;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover {
            background: #ff6b81;
        }
        .status {
            margin-top: 16px;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            font-size: 14px;
        }
        .status.ok {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            border: 2px solid #4caf50;
        }
        .status.error {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
            border: 2px solid #f44336;
        }
        .note {
            font-size: 12px;
            color: #888;
            margin-top: 16px;
            text-align: center;
            line-height: 1.8;
        }
        .note a { word-break: break-all; }
    </style>
</head>
<body>
    <h1>⭐ Star 픽셀 오피스 참여</h1>
    <div class="container">
        <div class="form-group">
            <label>표시 이름</label>
            <input type="text" id="agentName" placeholder="예: Star" maxlength="20">
        </div>
        <!-- Status and details are synced automatically after joining. -->
        <div class="form-group">
            <label>Agent 접속 키</label>
            <input type="text" id="joinKey" placeholder="전달받은 join key를 입력하세요" maxlength="64">
        </div>
        <button id="joinBtn">오피스 참여</button>
        <button id="leaveBtn" style="margin-top:10px; background:#555; border-color:#555;">오피스 나가기</button>
        <div id="status" class="status" style="display:none;"></div>
    </div>
    <div class="note">
        ⚠️ 참여에는 표시 이름과 join key만 필요합니다.<br>
        상태와 상세 내용은 agent가 이후 자동으로 동기화합니다.
        <br><br>
        📌 초대 안내:
        <a href="/invite" style="color:#ffd700; text-decoration: underline;">http://100.75.230.136:19000/invite</a>
    </div>

    <script>
        const joinBtn = document.getElementById('joinBtn');
        const leaveBtn = document.getElementById('leaveBtn');
        const statusDiv = document.getElementById('status');
        const agentNameInput = document.getElementById('agentName');
        const joinKeyInput = document.getElementById('joinKey');

        function showStatus(text, ok) {
            statusDiv.style.display = 'block';
            statusDiv.textContent = text;
            statusDiv.className = 'status ' + (ok ? 'ok' : 'error');
        }

        async function join() {
            const name = agentNameInput.value.trim();
            const joinKey = joinKeyInput.value.trim();
            if (!name) {
                showStatus('먼저 표시 이름을 입력해주세요.', false);
                return;
            }
            if (!joinKey) {
                showStatus('먼저 Agent 접속 키를 입력해주세요.', false);
                return;
            }
            try {
                const response = await fetch('/join-agent', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, joinKey })
                });
                const data = await response.json();
                if (data.ok) {
                    showStatus('참여 완료. 오피스를 새로고침하면 표시됩니다.', true);
                } else {
                    showStatus(data.msg || '참여에 실패했습니다', false);
                }
            } catch (e) {
                showStatus('네트워크 오류입니다. 다시 시도해주세요.', false);
            }
        }

        async function leave() {
            const name = agentNameInput.value.trim();
            if (!name) {
                showStatus('나갈 표시 이름을 먼저 입력해주세요.', false);
                return;
            }
            try {
                const response = await fetch('/leave-agent', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });
                const data = await response.json();
                if (data.ok) {
                    showStatus('오피스에서 나갔습니다.', true);
                } else {
                    showStatus(data.msg || '나가기에 실패했습니다', false);
                }
            } catch (e) {
                showStatus('네트워크 오류입니다. 다시 시도해주세요.', false);
            }
        }

        joinBtn.addEventListener('click', join);
        leaveBtn.addEventListener('click', leave);
    </script>
</body>
</html>
